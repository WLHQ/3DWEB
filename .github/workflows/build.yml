name: Build 3DWEB CIA

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install devkitPro toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y apt-transport-https gnupg

        sudo mkdir -p /etc/apt/keyrings
        curl https://apt.devkitpro.org/devkitpro-pub.gpg \
        | gpg --dearmor \
        | sudo tee /etc/apt/keyrings/devkitpro.gpg > /dev/null

        echo "deb [signed-by=/etc/apt/keyrings/devkitpro.gpg] https://apt.devkitpro.org stable main" \
        | sudo tee /etc/apt/sources.list.d/devkitpro.list

        sudo apt-get update
        sudo apt-get install -y devkitARM 3ds-dev 3ds-tools

    - name: Setup devkitPro environment
      run: |
        echo "DEVKITPRO=/opt/devkitpro" >> $GITHUB_ENV
        echo "DEVKITARM=/opt/devkitpro/devkitARM" >> $GITHUB_ENV
        echo "/opt/devkitpro/tools/bin" >> $GITHUB_PATH
        echo "/opt/devkitpro/devkitARM/bin" >> $GITHUB_PATH

    - name: Build project
      run: make

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: 3DWEB-build
        path: |
          *.cia
          *.3dsx
          *.elf
