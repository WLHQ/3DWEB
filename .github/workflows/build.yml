name: Build 3DWEB CIA

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install devkitPro
      run: |
        sudo apt-get update
        sudo apt-get install -y wget git
        wget https://apt.devkitpro.org/install-devkitpro-pacman
        chmod +x install-devkitpro-pacman
        sudo ./install-devkitpro-pacman

        sudo dkp-pacman -Syu --noconfirm
        sudo dkp-pacman -S --noconfirm 3ds-dev

    - name: Install makerom and bannertool
      run: |
        sudo dkp-pacman -S --noconfirm 3ds-tools

    - name: Setup devkitPro environment
      run: |
        echo "DEVKITPRO=/opt/devkitpro" >> $GITHUB_ENV
        echo "DEVKITARM=/opt/devkitpro/devkitARM" >> $GITHUB_ENV
        echo "/opt/devkitpro/tools/bin" >> $GITHUB_PATH
        echo "/opt/devkitpro/devkitARM/bin" >> $GITHUB_PATH

    - name: Build project
      run: |
        make

    - name: Build CIA
      run: |
        make cia || true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: 3DWEB-build
        path: |
          *.cia
          *.3dsx
          *.elf
